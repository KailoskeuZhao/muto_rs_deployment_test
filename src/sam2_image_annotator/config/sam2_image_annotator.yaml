sam2_image_annotator:
  ros__parameters:
    image_topic: /camera/color/image_raw
    annotated_topic: /sam2/annotated_image
    mask_topic: /sam2/mask
    instance_mask_topic: /sam2/instance_mask
    segments_topic: /sam2/segments

    # Relative paths are checked from both the launch working directory and the
    # installed SAM 2 project root (for example, /opt/sam2).
    checkpoint: checkpoints/sam2.1_hiera_base_plus.pt
    model_cfg: configs/sam2.1/sam2.1_hiera_b+.yaml
    device: cuda
    use_autocast: true
    autocast_dtype: bfloat16

    # YOLO detects objects and supplies one box prompt per object to SAM 2.
    prompt_mode: yolo
    yolo_model: yolo11n.pt
    yolo_device: "0"
    yolo_confidence: 0.25
    yolo_iou: 0.7
    yolo_imgsz: 640
    yolo_max_detections: 20
    yolo_classes: ""
    yolo_quantize: fp16

    # Manual mode prompt formats:
    #   point_coords: "x,y;x,y"
    #   point_labels: "1,0" where 1 is positive and 0 is negative
    #   box: "x1,y1,x2,y2"
    # Set prompt_mode to manual to use these instead of YOLO.
    default_prompt: center_point
    point_coords: ""
    point_labels: ""
    box: ""
    multimask_output: false

    overlay_alpha: 0.45
    mask_color_bgr: "0,255,0"
    contour_color_bgr: "0,255,255"
    draw_prompts: true
    publish_passthrough_on_error: true
    max_publish_rate: 1.0
    queue_size: 2
