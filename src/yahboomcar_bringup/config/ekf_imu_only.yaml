ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_frame
    world_frame: odom

    transform_time_offset: 0.0
    transform_timeout: 0.0
    publish_tf: true
    publish_acceleration: false
    print_diagnostics: true

    imu0: /imu/data_processed
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_queue_size: 20
    imu0_nodelay: false
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: false
    imu0_twist_rejection_threshold: 0.8
